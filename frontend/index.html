<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <title>Fast Courier</title>

    <!-- 
      Reads the persisted theme from localStorage (Zustand persist key:
      "theme-store") and applies the `dark` class on <html> before React
      mounts, avoiding a flash of the wrong theme on first paint.
    -->
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('theme-store')
          var theme = 'system'
          if (raw) {
            var parsed = JSON.parse(raw)
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme
            }
          }
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (_) {
          /* localStorage unavailable — fall back to OS preference */
        }
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
